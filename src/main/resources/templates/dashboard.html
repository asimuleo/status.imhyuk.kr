<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>imhyuk.kr - Cluster Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', sans-serif;
            padding: 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            border-bottom: 1px solid #21262d;
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 1.5rem;
            color: #58a6ff;
        }

        header h1 span {
            color: #e6edf3;
        }

        #connection-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: #21262d;
        }

        #connection-status.connected {
            color: #3fb950;
        }

        #connection-status.disconnected {
            color: #f85149;
        }

        .section-title {
            font-size: 0.9rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* 노드 섹션 */
        .nodes-grid {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .node-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .node-card .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.ready {
            background: #3fb950;
            box-shadow: 0 0 6px #3fb950;
        }

        .dot.notready {
            background: #f85149;
            box-shadow: 0 0 6px #f85149;
        }

        .dot.unknown {
            background: #d29922;
            box-shadow: 0 0 6px #d29922;
        }

        .node-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .node-status {
            font-size: 0.8rem;
            color: #8b949e;
        }

        /* 통계 섹션 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 4px;
        }

        /* Pod 테이블 */
        .table-container {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #21262d;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.8rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 10px 16px;
            font-size: 0.88rem;
            border-top: 1px solid #21262d;
        }

        tr:hover {
            background: #1c2128;
        }

        .badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.running {
            background: #1a3a2a;
            color: #3fb950;
        }

        .badge.pending {
            background: #3a2a1a;
            color: #d29922;
        }

        .badge.failed {
            background: #3a1a1a;
            color: #f85149;
        }

        .badge.unknown {
            background: #21262d;
            color: #8b949e;
        }

        /* 네임스페이스 */
        .ns-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .ns-tag {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.82rem;
            color: #58a6ff;
        }

        .last-updated {
            text-align: right;
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<header>
    <h1>🖥️ imhyuk.kr <span>/ cluster dashboard</span></h1>
    <div id="connection-status" class="disconnected">● 연결 중...</div>
</header>

<!-- 노드 상태 -->
<div class="section-title">Nodes</div>
<div class="nodes-grid" id="nodes-grid">
    <div class="node-card">로딩 중...</div>
</div>

<!-- 통계 -->
<div class="section-title">Overview</div>
<div class="stats-grid">
    <div class="stat-card">
        <div class="number" id="total-pods">-</div>
        <div class="label">Total Pods</div>
    </div>
    <div class="stat-card">
        <div class="number" id="running-pods">-</div>
        <div class="label">Running</div>
    </div>
    <div class="stat-card">
        <div class="number" id="pending-pods">-</div>
        <div class="label">Pending</div>
    </div>
    <div class="stat-card">
        <div class="number" id="total-namespaces">-</div>
        <div class="label">Namespaces</div>
    </div>
</div>

<!-- Pod 목록 -->
<div class="section-title">Pods</div>
<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Namespace</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="pods-table">
        <tr>
            <td colspan="3">로딩 중...</td>
        </tr>
        </tbody>
    </table>
</div>

<!-- 네임스페이스 -->
<div class="section-title">Namespaces</div>
<div class="ns-list" id="ns-list">로딩 중...</div>

<div class="last-updated" id="last-updated"></div>

<script>
    const statusEl = document.getElementById('connection-status');
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${location.host}/ws/k8s`);

    ws.onopen = () => {
        statusEl.textContent = '● Connected';
        statusEl.className = 'connected';
    };

    ws.onclose = () => {
        statusEl.textContent = '● Disconnected';
        statusEl.className = 'disconnected';
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        updateNodes(data.nodes);
        updatePods(data.pods);
        updateNamespaces(data.namespaces);
        updateStats(data.pods, data.namespaces);
        document.getElementById('last-updated').textContent =
            `Last updated: ${new Date().toLocaleTimeString()}`;
    };

    function updateNodes(nodes) {
        const grid = document.getElementById('nodes-grid');
        grid.innerHTML = nodes.map(node => `
            <div class="node-card">
                <div class="dot ${node.status.toLowerCase()}"></div>
                <div>
                    <div class="node-name">${node.name}</div>
                    <div class="node-status">${node.status}</div>
                </div>
            </div>
        `).join('');
    }

    function updatePods(pods) {
        const tbody = document.getElementById('pods-table');
        tbody.innerHTML = pods.map(pod => `
            <tr>
                <td>${pod.name}</td>
                <td>${pod.namespace}</td>
                <td><span class="badge ${pod.status?.toLowerCase()}">${pod.status ?? 'Unknown'}</span></td>
            </tr>
        `).join('');
    }

    function updateNamespaces(namespaces) {
        document.getElementById('ns-list').innerHTML =
            namespaces.map(ns => `<span class="ns-tag">${ns}</span>`).join('');
    }

    function updateStats(pods, namespaces) {
        document.getElementById('total-pods').textContent = pods.length;
        document.getElementById('running-pods').textContent =
            pods.filter(p => p.status === 'Running').length;
        document.getElementById('pending-pods').textContent =
            pods.filter(p => p.status === 'Pending').length;
        document.getElementById('total-namespaces').textContent = namespaces.length;
    }
</script>

</body>
</html>
